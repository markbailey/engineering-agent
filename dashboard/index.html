<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo"><span>&gt;</span> agent<span>.</span>dashboard</div>
    </div>
    <div class="connection-badge">
      <div class="connection-dot" id="connectionDot"></div>
      <span id="connectionLabel">connecting</span>
    </div>
  </header>

  <!-- TABS -->
  <div class="tab-bar" id="tabBar">
    <!-- tabs rendered dynamically -->
  </div>

  <!-- ERROR BANNER -->
  <div class="error-banner" id="errorBanner">
    <span class="error-banner-icon">!</span>
    <span id="errorBannerText"></span>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">//</div>
      <div>no active runs</div>
      <div style="font-size: 11px; color: var(--text-muted)">waiting for runs/ data</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
